                    format: int32
                createdAt:
                    type: string
                updatedAt:
                    type: string
            description: UserInfo 用户公开信息(不含 password_hash / api_key)。
tags:
    - name: Kuaishou
      description: |-
        Kuaishou 快手广告实体与报表批量查询服务。
         所有列表接口统一采用基于 page_token 的游标分页, 支持名称/状态等过滤与按金额排序。
    - name: Oceanengine
      description: |-
        Oceanengine 巨量广告实体与报表批量查询服务。
         所有列表接口统一采用基于 page_token 的游标分页, 支持名称/状态等过滤与按金额/时间排序。
    - name: Tenant
      description: Tenant 租户(组织)服务。
    - name: User
      description: User 系统用户服务, 仅提供当前用户查询。
