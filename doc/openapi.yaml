                charge:
                    type: string
                    description: charge 区间累计花费, 字符串返回避免精度丢失。
                rowCount:
                    type: string
                    description: row_count 参与聚合的明细行数。
                metrics:
                    type: object
                    description: metrics 累加(sum)后的原始指标。
                ratios:
                    type: object
                    description: ratios 依据 oe_report_metric_meta 计算的比率类指标(cpc_platform/ctr/conversion_cost 等)。
