                createdBy:
                    type: integer
                    description: created_by 创建者用户ID; 0 表示未设置。
                    format: int32
                createdAt:
                    type: string
                updatedAt:
                    type: string
            description: TenantInfo 租户信息。
        user.v1.UserInfo:
            type: object
            properties:
                id:
                    type: integer
                    format: int32
