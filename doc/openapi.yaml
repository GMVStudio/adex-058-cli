                    type: string
                    description: next_page_token 下一页游标; has_more 为 false 时为空。
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/tenant.v1.TenantInfo'
            description: ListTenantsReply 批量查询租户响应。
        tenant.v1.TenantInfo:
            type: object
            properties:
                id:
                    type: integer
                    format: int32
                name:
                    type: string
                status:
                    type: string
