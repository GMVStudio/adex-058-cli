            description: 'GetOeUnit 获取单个单元详情(含 meta JSON: learning_phase/opt_status/出价等)。'
            operationId: Oceanengine_GetOeUnit
            parameters:
                - name: promotionId
                  in: path
                  description: promotion_id 单元ID, 路径参数。
                  required: true
                  schema:
                    type: string
                - name: tenantId
                  in: query
                  description: tenant_id 租户ID, 必填。
                  schema:
                    type: integer
                    format: int32
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/oe.v1.OeUnit'
    /v1/tenants:
        get:
            tags:
                - Tenant
            description: ListTenants 批量查询租户, 支持按名称模糊过滤和状态过滤。
            operationId: Tenant_ListTenants
            parameters:
                - name: name
                  in: query
                  description: name 按租户名称模糊匹配; 留空表示不过滤。
                  schema:
                    type: string
                - name: status
                  in: query
                  description: status 按状态精确匹配(active / disabled); 留空表示不过滤。
                  schema:
                    type: string
                - name: pageToken
                  in: query
                  description: page_token 游标分页令牌, 透传上一次响应的 next_page_token; 首页留空。
                  schema:
                    type: string
                - name: pageSize
                  in: query
                  description: page_size 每页条数, 默认 20, 最大 200。
                  schema:
                    type: integer
                    format: int32
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/tenant.v1.ListTenantsReply'
    /v1/users/me:
        get:
            tags:
                - User
            description: GetCurrentUser 获取当前登录用户(由 Bearer api_key 解析)。
            operationId: User_GetCurrentUser
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/user.v1.UserInfo'
