                totalShow:
                    type: string
                    description: total_show 总展示 sum(show_cnt)。
                totalClick:
                    type: string
                    description: total_click 总点击 sum(click_cnt)。
                totalConvert:
                    type: string
                    description: total_convert 总转化 sum(convert_cnt)。
                overallCpa:
                    type: number
                    description: overall_cpa 整体CPA = total_charge / total_convert。
                    format: double
                overallCtr:
                    type: number
                    description: overall_ctr 整体CTR(%) = total_click / total_show * 100。
                    format: double
                overallConversionRate:
                    type: number
                    description: overall_conversion_rate 整体转化率(%) = total_convert / total_click * 100。
                    format: double
            description: OeDashboardMetrics 区间汇总指标与整体比率。
