                 oe_report_metric_meta 报表指标元数据
                 ---------------------------------------------------------------------------
        oe.v1.OeReportSummaryRow:
            type: object
            properties:
                groupKey:
                    type: string
                    description: group_key 维度ID; group_by 为空(总计)时为 0。
                groupName:
                    type: string
